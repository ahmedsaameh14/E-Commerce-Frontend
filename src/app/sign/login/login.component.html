<div class="login-page d-flex align-items-center justify-content-center">
  <div class="card login-card shadow-lg p-5 w-100" style="max-width: 500px;">
    <div class="text-center mb-4">
      <h2 class="login-title">Welcome Back</h2>
      <p class="text-muted">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>

      <!-- Email -->
      <div class="mb-4">
        <label class="form-label fw-500">Email Address</label>
        <input 
          type="email" 
          formControlName="email" 
          class="form-control form-control-lg"
          [ngClass]="{ 'is-invalid': isFieldInvalid('email') }"
          placeholder="Enter your email"
        />
        <div class="error-message" *ngIf="getFieldError('email')">
          <i class="fas fa-exclamation-circle me-2"></i>{{ getFieldError('email') }}
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label fw-500">Password</label>
        <input 
          type="password" 
          formControlName="password" 
          class="form-control form-control-lg"
          [ngClass]="{ 'is-invalid': isFieldInvalid('password') }"
          placeholder="Enter your password"
        />
        <div class="error-message" *ngIf="getFieldError('password')">
          <i class="fas fa-exclamation-circle me-2"></i>{{ getFieldError('password') }}
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3" [disabled]="loginForm.invalid">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <!-- Divider -->
    <div class="divider my-4">
      <span>Or</span>
    </div>

    <!-- Link to registration -->
    <div class="text-center">
      <p class="text-muted mb-0">Don't have an account?</p>
      <a routerLink="/reg" class="btn btn-link btn-lg fw-bold p-0">Create one now</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
