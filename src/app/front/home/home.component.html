<div class="home-page">
  <section class="welcome-section">
    <div class="welcome-overlay">
      <h1 class="welcome-text">Welcome to <span class="text-primary">VIX</span></h1>
      <p class="welcome-subtext">Discover amazing products at unbeatable prices</p>
      <div class="scroll-indicator d-none d-md-block">
        <i class="bi bi-chevron-down"></i>
      </div>
    </div>
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1600&q=80" 
         alt="Cover" class="welcome-img">
  </section>

  <section class="cta-section">
    <div class="cta-overlay container">
      <div class="cta-content p-4 p-md-5">
        <h2 class="display-4 fw-bold">Start Shopping Now</h2>
        <p class="lead mb-4">Explore our wide range of products curated just for you.</p>
        <button class="btn btn-primary btn-lg px-5 py-3 shadow" routerLink="/products">
          Explore Products <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=1350&q=80" 
         alt="Products" class="cta-img">
  </section>

  <section class="contact-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="contact-card shadow-lg">
            <h2 class="text-center mb-2">Get in Touch</h2>
            <p class="text-center text-muted mb-4">We'd love to hear from you!</p>
            
            <form class="contact-form">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Name">
                <label for="name">Your Name</label>
              </div>
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email">
                <label for="email">Email Address</label>
              </div>
              <div class="form-floating mb-4">
                <textarea class="form-control" id="message" style="height: 120px" placeholder="Message"></textarea>
                <label for="message">Your Message</label>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Send Message</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
