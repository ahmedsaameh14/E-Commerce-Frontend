<nav class="navbar navbar-expand-lg custom-navbar">

    <button class="navbar-toggler" type="button" (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>

      <ul class="navbar-nav ms-auto align-items-center">
        
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Products</a>
        </li>

        <ng-container *ngIf="user$ | async as user; else guestLinks">
          
          <li class="nav-item d-none d-lg-flex">
            <a class="nav-link icon-link" routerLink="/cart" title="Cart">
              <i class="bi bi-cart2"></i>
            </a>
          </li>
          <li class="nav-item d-none d-lg-flex">
            <a class="nav-link icon-link" routerLink="/profile" title="Profile">
              <i class="bi bi-person-circle"></i>
            </a>
          </li>
          <li class="nav-item d-none d-lg-flex">
            <button class="btn btn-logout ms-2" (click)="logout()">Logout</button>
          </li>

          <li class="nav-item d-lg-none w-100 border-top mt-2 pt-2">
            <a class="nav-link" routerLink="/profile" (click)="closeMenu()">
              <i class="bi bi-person me-2"></i>Profile
            </a>
          </li>

            <a class="nav-link" routerLink="/cart" (click)="closeMenu()">
              <i class="bi bi-cart3 me-2"></i>Cart
            </a>

              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </a>
          </li>
        </ng-container>

        <ng-template #guestLinks>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
          </li>
          <li class="nav-item">
